<h2>Admin Login</h2>
<form onsubmit="login(event)">
<input id="email" placeholder="Email">
<input id="password" type="password">
<button>Login</button>
</form>

<script>
function login(e){
 e.preventDefault();
 fetch('/login',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
   email:email.value,
   password:password.value
  })
 }).then(r=>r.json()).then(d=>alert(d.status))
}
</script>
